<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Timo de Haart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header" id="siteHeader">
        <div class="header-left">TIMO DE HAART</div>

        <button class="menu-btn" aria-label="Toggle navigation" aria-expanded="false" id="menuBtn">
            <span class="hamburger-lines"></span>
        </button>

        <nav class="header-right" id="headerNav">
            <a href="#work">WORK</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <section class="hero">
        <img src="img/backImage.png" alt="Back image" class="hero-back-image">
        <img src="img/frontImage.png" alt="Front image" class="hero-image">
        <div class="hero-title">TIMO</div>
        <div class="hero-label hero-label-left">PORTFOLIO</div>
        <div class="hero-label hero-label-right">UX/UI</div>
    </section>

    <script>
        const menuBtn   = document.getElementById('menuBtn');
        const headerNav = document.getElementById('headerNav');
        const header    = document.getElementById('siteHeader');

        /* ── Mobile menu toggle ── */
        function closeMobileMenu() {
            headerNav.classList.remove('open');
            menuBtn.classList.remove('open');
            menuBtn.setAttribute('aria-expanded', 'false');
        }

        menuBtn.addEventListener('click', () => {
            const opened = headerNav.classList.toggle('open');
            menuBtn.classList.toggle('open');
            menuBtn.setAttribute('aria-expanded', String(opened));
        });

        document.querySelectorAll('.header-right a').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) closeMobileMenu();
        });
    </script>
</body>
</html>
