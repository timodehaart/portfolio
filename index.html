<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Timo</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>
    <div class="vignette-left"   aria-hidden="true"></div>
    <div class="vignette-right"  aria-hidden="true"></div>
    <div class="vignette-bottom" aria-hidden="true"></div>
 
    <header>
        <!-- add data-enter="0" to the img and hamburger -->
        <img src="img/logo/letter.svg" alt="Logo" data-enter="0">
        <div class="hamburger" id="menuToggle" data-enter="100"></div>
    </header>

    </div>
 
    <!-- Hero Section -->
    <section class="hero">
        <!-- Hero elements -->
        <div class="hero-left">
            <span class="hero-vertical" data-enter="800">( Timo de Haart )</span>
        </div>

        <div class="hero-center">
            <img src="img/logo/brand.svg" alt="Brand Logo" class="hero-logo" data-enter="200">
            <p class="hero-sub" data-enter="600">UX/UI Designer & Frontend Developer.</p>
        </div>

        <div class="hero-right">
            <span class="hero-links" data-enter="700">Portfolio</span>
        </div>
    </section>
 
    <!-- Infinite Slider: viewport clips to top half, full image fills each card -->
    <div class="slider-viewport" id="sliderViewport" data-reveal>
        <div class="slider-track" id="sliderTrack" data-enter="1200">
            <!-- Original set -->
            <div class="slide-item"><img src="img/projects/psyduck.jpg" alt="Pokemon Psyduck" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/croc-poster.jpg" alt="Croc Poster" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/heart-poster.jpg" alt="Heart Poster" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/skating-poster.jpg" alt="Skating Poster" draggable="false"></div>
            <!-- Clone set — identical, enables seamless jump -->
            <div class="slide-item"><img src="img/projects/psyduck.jpg" alt="Pokemon Psyduck" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/croc-poster.jpg" alt="Croc Poster" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/heart-poster.jpg" alt="Heart Poster" draggable="false"></div>
            <div class="slide-item"><img src="img/projects/skating-poster.jpg" alt="Skating Poster" draggable="false"></div>
        </div>
 
        <!-- Statement overlay — sits at the top of the cards -->
        <div class="slider-statement">
            <p class="statement-text">
                Designing digital experiences that feel <em>considered</em>, crafted, and impossible to ignore.
            </p>
        </div>
    </div>
 
    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="#"><span class="nav-index">( _01 )</span>Home</a></li>
            <li><a href="#"><span class="nav-index">( _02 )</span>Projects</a></li>
            <li><a href="#"><span class="nav-index">( _03 )</span>About</a></li>
            <li><a href="#"><span class="nav-index">( _04 )</span>Contact</a></li>
        </ul>
    </nav>
 
    <script src="js/menu.js"></script>
    <script src="js/animations.js"></script>
</body>
</html>
